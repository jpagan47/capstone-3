<div class="filter-box">
    <h3>🎮 Filters</h3>
    <div class="form-floating mb-3">
        <select id="category-select" class="form-select" onchange="setCategory(this)">
            <option value="0">Show All</option>
        </select>
        <label for="category-select">Category</label>
    </div>
    <div class="price-filter">
        <label for="min-price" class="form-label">
            Minimum Price: $<span id="min-price-display">0</span>
        </label>
        <input type="range" class="form-range" id="min-price" min="0" max="200" value="0" onchange="setMinPrice(this)">
    </div>
    <div class="price-filter">
        <label for="max-price" class="form-label">
            Maximum Price: $<span id="max-price-display">200</span>
        </label>
        <input type="range" class="form-range" id="max-price" min="0" max="200" value="200" onchange="setMaxPrice(this)">
    </div>
    <div class="form-floating mb-3">
        <select id="subcategory-select" class="form-select" onchange="setSubcategory(this)">
            <option value="">Show All</option>
            <option>Action</option>
            <option>Adventure</option>
            <option>RPG</option>
            <option>Sports</option>
            <option>Racing</option>
            <option>Shooter</option>
            <option>Fighting</option>
            <option>Strategy</option>
            <option>Simulation</option>
            <option>Puzzle</option>
        </select>
        <label for="subcategory-select">Genre</label>
    </div>
</div>
<div id="content" class="content"></div>
